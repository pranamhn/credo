bank_code: BTN
bank_name: Bank Tabungan Negara
version: 1

detection:
  header_keywords:
    - PT BANK TABUNGAN NEGARA
    - BANK BTN
    - BTN MOBILE
    - INTERNET BANKING BTN
  account_no_pattern: "\\b\\d{15}\\b"

parsing:
  date_format: "%d/%m/%Y"
  decimal_separator: ","
  thousand_separator: "."
  table_columns:
    date: 0
    description: 1
    debit: 2       # header: MUTASI DEBIT
    credit: 3      # header: MUTASI KREDIT
    balance: 4
  mutation_format: separate_debit_credit

header_patterns:
  period: "(?:PERIODE|PERIOD)\\s*:?\\s*(\\d{2}/\\d{2}/\\d{4})\\s*[-–s/d]+\\s*(\\d{2}/\\d{2}/\\d{4})"
  opening_balance: "SALDO\\s+AWAL\\s*:?\\s*([\\d.,]+)"
  closing_balance: "SALDO\\s+AKHIR\\s*:?\\s*([\\d.,]+)"
  account_no: "(?:NO\\.?\\s*REKENING|NOMOR\\s+REKENING)\\s*:?\\s*(\\d[\\d\\s-]+\\d)"
  account_holder: "(?:NAMA|PEMILIK)\\s*:?\\s*(.+)"

notes: >
  BTN focuses on mortgage (KPR) customers — expect frequent loan_repayment debit transactions.
  Table headers use "MUTASI DEBIT" / "MUTASI KREDIT" compound form.
