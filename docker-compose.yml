version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: risklens
      POSTGRES_PASSWORD: risklens
      POSTGRES_DB: risklens
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U risklens"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://risklens:risklens@db:5432/risklens
      DATABASE_URL_SYNC: postgresql://risklens:risklens@db:5432/risklens
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      STORAGE_ENDPOINT: ${STORAGE_ENDPOINT:-}
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY:-}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY:-}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-risklens-statements}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend:/app
    restart: unless-stopped

  worker:
    build: ./backend
    command: celery -A app.workers.celery_app.celery worker --loglevel=info --concurrency=4
    environment:
      DATABASE_URL_SYNC: postgresql://risklens:risklens@db:5432/risklens
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      STORAGE_ENDPOINT: ${STORAGE_ENDPOINT:-}
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY:-}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY:-}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-risklens-statements}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend:/app
    restart: unless-stopped

  flower:
    build: ./backend
    command: celery -A app.workers.celery_app.celery flower --port=5555
    ports:
      - "5555:5555"
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
      - redis
      - worker

volumes:
  postgres_data:
  redis_data:
